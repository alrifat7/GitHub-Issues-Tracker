<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen shadow-xl max-w-md mx-auto">

    <div class="logo flex justify-center my-10 py-10">
        <img src="./assets/github-logo.png" alt="">
    </div>
    <div class="justify-center text-center">
        <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-gray-400">sign in to manage your issues</p>
    </div>
    
    <section class="login justify-center flex ">
        <fieldset class="fieldset   rounded-box w-xs ">
    <legend class="fieldset-legend"></legend>

    <label class="label">Username</label>
    <input id="input-username" type="text" class="input" placeholder="Enter Username" />

    <label class="label">Password</label>
    <input id="input-password" type="password" class="input"value="admin" placeholder="Enter Password" />

    <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
</fieldset>
    </section>

<!-- login-js -->
    <script src="./script/login.js"></script>
</body>
</html>
